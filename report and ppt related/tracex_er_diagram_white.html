
<div style="background:#fff; padding: 24px; font-family: Arial, sans-serif;">
  <div style="text-align:center; margin-bottom: 20px;">
    <span style="font-size:18px; font-weight:700; color:#000; letter-spacing:1px;">TRACEX — Entity Relationship Diagram</span>
  </div>
  <canvas id="erCanvas" width="1100" height="780" style="width:100%; border:1px solid #ccc;"></canvas>
  <div style="text-align:center; margin-top:14px;">
    <button onclick="downloadER()" style="padding:10px 28px; background:#000; color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer;">Download Image</button>
  </div>
</div>
<script>
const canvas = document.getElementById('erCanvas');
const ctx = canvas.getContext('2d');

const W = 1100, H = 780;
ctx.fillStyle = '#fff';
ctx.fillRect(0, 0, W, H);

function drawEntity(x, y, title, attrs) {
  const w = 200, rowH = 26, headerH = 36;
  const totalH = headerH + attrs.length * rowH;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.rect(x, y, w, totalH);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.rect(x, y, w, headerH);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(title, x + w/2, y + headerH/2 + 5);
  ctx.fillStyle = '#000';
  ctx.font = '12px Arial';
  ctx.textAlign = 'left';
  attrs.forEach((attr, i) => {
    const ay = y + headerH + i * rowH;
    if (i % 2 === 1) {
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(x + 1, ay, w - 2, rowH);
    }
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x, ay);
    ctx.lineTo(x + w, ay);
    ctx.stroke();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.fillStyle = '#000';
    const isPK = attr.includes('PK');
    const isFK = attr.includes('FK');
    if (isPK) ctx.font = 'bold 12px Arial';
    else ctx.font = '12px Arial';
    ctx.fillText(attr, x + 10, ay + 17);
    if (isPK) {
      ctx.font = '11px Arial';
      ctx.fillStyle = '#555';
      ctx.fillText('🔑', x + w - 24, ay + 17);
    }
    if (isFK) {
      ctx.font = '11px Arial';
      ctx.fillStyle = '#555';
      ctx.fillText('FK', x + w - 24, ay + 17);
    }
    ctx.fillStyle = '#000';
  });
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, totalH);
  return { x, y, w, h: totalH };
}

function drawLine(x1, y1, x2, y2, label) {
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  if (label) {
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    ctx.fillStyle = '#fff';
    ctx.fillRect(mx - 30, my - 10, 60, 18);
    ctx.fillStyle = '#000';
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(label, mx, my + 3);
  }
}

function drawCrow(x, y, dir) {
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.2;
  const s = 10;
  if (dir === 'right') {
    ctx.beginPath(); ctx.moveTo(x, y-6); ctx.lineTo(x+s, y); ctx.lineTo(x, y+6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-4, y-6); ctx.lineTo(x+s-4, y); ctx.lineTo(x-4, y+6); ctx.stroke();
  } else if (dir === 'left') {
    ctx.beginPath(); ctx.moveTo(x, y-6); ctx.lineTo(x-s, y); ctx.lineTo(x, y+6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+4, y-6); ctx.lineTo(x-s+4, y); ctx.lineTo(x+4, y+6); ctx.stroke();
  } else if (dir === 'down') {
    ctx.beginPath(); ctx.moveTo(x-6, y); ctx.lineTo(x, y+s); ctx.lineTo(x+6, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-6, y-4); ctx.lineTo(x, y+s-4); ctx.lineTo(x+6, y-4); ctx.stroke();
  } else if (dir === 'up') {
    ctx.beginPath(); ctx.moveTo(x-6, y); ctx.lineTo(x, y-s); ctx.lineTo(x+6, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-6, y+4); ctx.lineTo(x, y-s+4); ctx.lineTo(x+6, y+4); ctx.stroke();
  }
}

const users    = drawEntity(30,  30,  'USERS',       ['uid  (PK)', 'name', 'email', 'phoneNumber', 'whatsAppNumber']);
const lost     = drawEntity(30,  320, 'LOST_ITEMS',  ['docId  (PK)', 'uid  (FK)', 'title', 'description', 'category', 'image', 'date', 'time']);
const found    = drawEntity(450, 30,  'FOUND_ITEMS', ['docId  (PK)', 'reportedBy  (FK)', 'title', 'description', 'category', 'image', 'place', 'date', 'time']);
const matches  = drawEntity(450, 400, 'MATCHES',     ['matchId  (PK)', 'foundItemId  (FK)', 'lostItemId  (FK)', 'foundByUid  (FK)', 'lostByUid  (FK)', 'score', 'status']);
const messages = drawEntity(820, 30,  'MESSAGES',    ['messageId  (PK)', 'matchId  (FK)', 'senderId  (FK)', 'text', 'createdAt']);

// USERS → LOST_ITEMS (vertical)
drawLine(130, users.y + users.h, 130, lost.y, 'reports');
drawCrow(130, lost.y, 'down');

// USERS → FOUND_ITEMS (horizontal top)
drawLine(users.x + users.w, users.y + 18, found.x, found.y + 18, 'reports');
drawCrow(found.x, found.y + 18, 'right');

// LOST_ITEMS → MATCHES
drawLine(lost.x + lost.w, lost.y + 60, matches.x, matches.y + 60, 'matched in');
drawCrow(matches.x, matches.y + 60, 'right');

// FOUND_ITEMS → MATCHES (vertical)
drawLine(found.x + 100, found.y + found.h, found.x + 100, matches.y, 'matched in');
drawCrow(found.x + 100, matches.y, 'down');

// MATCHES → MESSAGES
drawLine(matches.x + matches.w, matches.y + 36, messages.x, messages.y + 180, 'has');
drawCrow(messages.x, messages.y + 180, 'right');

// USERS → MESSAGES
drawLine(users.x + users.w, users.y + 60, messages.x, messages.y + 60, 'sends');
drawCrow(messages.x, messages.y + 60, 'right');

// Title
ctx.font = 'bold 16px Arial';
ctx.fillStyle = '#000';
ctx.textAlign = 'center';
ctx.fillText('Tracex — Entity Relationship Diagram', W/2, H - 20);

function downloadER() {
  const link = document.createElement('a');
  link.download = 'tracex_er_diagram.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
